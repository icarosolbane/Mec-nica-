<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tormenta20 - Gerenciador</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="wrap">
<h1>Gerenciador Tormenta20</h1>

<div class="card">
<h2>Personagem</h2>
<input id="charName" placeholder="Nome do Personagem">
<input id="charLevel" type="number" placeholder="Nível">
<button onclick="saveCharacter()">Salvar Personagem</button>
<p id="charMsg"></p>
</div>

<div class="card">
<h2>Engenhoca</h2>
<input id="engName" placeholder="Nome">
<input id="engBase" type="number" placeholder="PM Base">
<input id="engApr" type="number" placeholder="PM Aprimoramentos">
<button onclick="addEng()">Adicionar ao Inventário</button>
<div id="engOut"></div>
</div>

<div class="card">
<h2>Poção</h2>
<input id="potName" placeholder="Nome">
<input id="potPM" type="number" placeholder="PM Total">
<button onclick="addPotion()">Adicionar ao Inventário</button>
<div id="potOut"></div>
</div>

<div class="card">
<h2>Pergaminho</h2>
<input id="scrName" placeholder="Nome">
<input id="scrBase" type="number" placeholder="PM Base">
<input id="scrApr" type="number" placeholder="PM de Aprimoramentos ao Usar">
<button onclick="addScroll()">Adicionar ao Inventário</button>
<div id="scrOut"></div>
</div>

<div class="card">
<h2>Tabela de Círculos</h2>
<ul>
<li>1º = 1 PM</li>
<li>2º = 3 PM</li>
<li>3º = 6 PM</li>
<li>4º = 10 PM</li>
<li>5º = 15 PM</li>
</ul>
</div>

<div class="card">
<h2>Inventário</h2>
<button class="danger" onclick="clearInventory()">Limpar Inventário</button>
<div id="inventory"></div>
</div>
</div>
<script src="script.js"></script>
</body>
</html>
